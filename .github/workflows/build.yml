name: Build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary="rmq"
          if [ "$GOOS" = "windows" ]; then
            binary="rmq.exe"
          fi
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-8)"
          version="dev-${short_sha}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          build_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${version} -X main.commit=${short_sha} -X main.buildDate=${build_date}" \
            -o "dist/${binary}" \
            ./cmd

      - name: Package artifact
        id: package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            package="rmq_${version}_${GOOS}_${GOARCH}"
          else
            short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-8)"
            package="rmq-${short_sha}-${GOOS}-${GOARCH}"
          fi
          mkdir -p "dist/${package}"
          if [ "${GOOS}" = "windows" ]; then
            cp dist/rmq.exe "dist/${package}/rmq.exe"
            cd dist
            zip -r "${package}.zip" "${package}"
            shasum -a 256 "${package}.zip" > "${package}.zip.sha256"
          else
            cp dist/rmq "dist/${package}/rmq"
            cd dist
            tar -czf "${package}.tar.gz" "${package}"
            shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256"
          fi
          echo "artifact=dist/${package}.${ARCHIVE}" >> "${GITHUB_OUTPUT}"
          echo "checksum=dist/${package}.${ARCHIVE}.sha256" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmq-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"
          fi
