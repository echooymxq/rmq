name: Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary="rmq"
          if [ "$GOOS" = "windows" ]; then
            binary="rmq.exe"
          fi
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/${binary}" \
            ./cmd

      - name: Package artifact
        run: |
          package="rmq-${{ github.sha }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${package}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp dist/rmq.exe "dist/${package}/rmq.exe"
            cd dist
            zip -r "${package}.zip" "${package}"
            shasum -a 256 "${package}.zip" > "${package}.zip.sha256"
          else
            cp dist/rmq "dist/${package}/rmq"
            cd dist
            tar -czf "${package}.tar.gz" "${package}"
            shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmq-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/rmq-${{ github.sha }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            dist/rmq-${{ github.sha }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
